<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: 'Segoe UI', sans-serif;
      background: #fff;
      color: #1a1a1a;
    }

    .header {
      background: #2B579A;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header svg { flex-shrink: 0; }

    .header-text h2 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .header-text p {
      font-size: 10px;
      color: #c7d9f5;
      margin-top: 1px;
    }

    .body { padding: 14px 16px; }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .field { flex: 1; }

    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: #2B579A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input[type="number"] {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid #d0d9ec;
      border-radius: 5px;
      font-size: 13px;
      color: #1a1a1a;
      background: #f5f8ff;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="number"]:focus { border-color: #2B579A; background: #fff; }

    .divider {
      height: 1px;
      background: #e8edf5;
      margin: 12px 0;
    }

    .append-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #d0d9ec;
      border-radius: 18px;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider { background: #2B579A; }
    .toggle input:checked + .slider::before { transform: translateX(14px); }

    .append-label { font-size: 12px; color: #333; }

    #fileWrap {
      display: none;
      margin-bottom: 12px;
    }

    .file-input-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1.5px dashed #2B579A;
      border-radius: 5px;
      cursor: pointer;
      background: #f5f8ff;
      font-size: 11px;
      color: #2B579A;
      font-weight: 600;
      transition: background 0.15s;
    }

    .file-input-label:hover { background: #e8edf5; }

    #docxFile { display: none; }

    #fileStatus {
      font-size: 10px;
      color: #2B579A;
      margin-top: 4px;
      padding-left: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .buttons { display: flex; gap: 8px; margin-bottom: 12px; }

    #startBtn {
      flex: 1;
      padding: 9px;
      background: #2B579A;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #startBtn:hover:not(:disabled) { background: #1e3f73; }
    #startBtn:disabled { background: #c0cde6; cursor: default; }

    #stopBtn {
      display: none;
      padding: 9px 14px;
      background: #fff;
      color: #c0392b;
      border: 1.5px solid #c0392b;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #stopBtn:hover { background: #fff5f5; }

    .progress-wrap {
      display: none;
      background: #e8edf5;
      border-radius: 99px;
      height: 5px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2B579A, #4a90d9);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    #status {
      font-size: 11px;
      color: #666;
      min-height: 15px;
      text-align: center;
    }

    #status.done { color: #1e7e34; font-weight: 600; }
    #status.error { color: #c0392b; }
    #status.stopped { color: #e67e22; }
  </style>
</head>
<body>

  <div class="header">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="4" fill="white" fill-opacity="0.15"/>
      <path d="M7 7h14v2H7zM7 12h14v2H7zM7 17h9v2H7z" fill="white"/>
    </svg>
    <div class="header-text">
      <h2>PageScribe</h2>
      <p>PDF → Word converter</p>
    </div>
  </div>

  <div class="body">

    <div class="row">
      <div class="field">
        <label>From</label>
        <input type="number" id="startPage" min="1" value="1">
      </div>
      <div class="field">
        <label>To</label>
        <input type="number" id="stopPage" min="1" value="5">
      </div>
    </div>

    <div class="divider"></div>

    <div class="append-row">
      <label class="toggle">
        <input type="checkbox" id="appendMode">
        <span class="slider"></span>
      </label>
      <span class="append-label">Append to existing file</span>
    </div>

    <div id="fileWrap">
      <label class="file-input-label" for="docxFile">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2B579A" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Choose .docx file
      </label>
      <input type="file" id="docxFile" accept=".docx">
      <div id="fileStatus"></div>
    </div>

    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="stopBtn">Stop</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div id="progressBar"></div>
    </div>

    <div id="status"></div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
